<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - FotoShoot</title>
    <link rel="icon" type="image/png" href="/assets/Favicon.png" />
    <link rel="stylesheet" href="/darkroomx-common/styles.css" />
  </head>
  <body class="signup-page">
    <main class="signup-shell">
      <a class="signup-back" href="/">← Back to Home</a>
      <section class="signup-card" aria-label="Sign up">
        <img src="/assets/fotoshoot-logo-white.png" alt="FotoShoot" class="signup-logo" />
        <h1>Create your account</h1>
        <p>Sign up with Google to start creating with FotoShoot.</p>
        <a class="signup-google-btn" href="/api/auth/google">Continue with Google</a>
      </section>
    </main>
  </body>
</html>
